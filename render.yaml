# Render Blueprint — single web service that serves the built frontend AND the API
# on one origin (Express serves dist/ + /api/*; the client uses relative /api calls).
#
# Deploy: push this repo to GitHub, then in Render choose New > Blueprint and point
# it at the repo. Set ANTHROPIC_API_KEY when prompted (the chart works without it;
# the Ask agent returns a clean 503 until a key is provided).
services:
  - type: web
    name: tracespend
    runtime: node
    plan: free
    # --include=dev guarantees the build tools (tsc, vite) install even if
    # NODE_ENV=production; express + dotenv are runtime deps so they persist.
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server/index.mjs
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ANTHROPIC_API_KEY
        sync: false
      # Secret that gates the hidden /api/log/clear + /api/log/export endpoints.
      # Generate with `openssl rand -hex 32` and paste it in the Render dashboard
      # (kept out of the repo). Without it those endpoints stay 404.
      - key: LOG_CLEAR_TOKEN
        sync: false
      # Durable activity-log storage, auto-injected from the free Postgres below
      # (internal connection string). Without it the server falls back to a file.
      - key: DATABASE_URL
        fromDatabase:
          name: tracespend-db
          property: connectionString

# Free managed Postgres for the runtime activity log — survives restarts/redeploys,
# unlike the container disk. Note: Render deletes FREE databases ~30 days after
# creation (fine for an assessment window; re-provision if you need longer).
databases:
  - name: tracespend-db
    plan: free
    databaseName: tracespend
    user: tracespend
